name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build release APK
        run: ./gradlew assembleCoreRelease

      - name: Build debug APK
        run: ./gradlew assembleCoreDebug

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Simple Dialer ${{ steps.version.outputs.tag }}
          body: |
            ## Simple Dialer ${{ steps.version.outputs.tag }}

            Fork of Simple Dialer with added features:
            - 📞 **Call Recording** — Record all calls with configurable storage folder (SAF folder picker)
            - 🤖 **Auto-Answer** — Automatically answer calls (all / unknown callers / disabled)
            - 💬 **Custom Greeting** — Configurable TTS greeting for auto-answered calls
            - 🔊 **Greeting Preview** — Listen to what callers will hear
            - 📋 **Call Summary** — Notification summary after each call

            ### Changes in this release
            - 🔑 **Stable signing key** — Committed PKCS12 keystore ensures updates install over previous versions without uninstalling
            - 📂 **Folder picker for recordings** — Replaced text field with Android's standard folder selection dialog (SAF)

            ### Install
            Download the **release APK** (signed, minified).

            ⚠️ **If upgrading from v1.1.0 or earlier**, you must uninstall first (signing key changed). Future updates from this version onward will work without uninstalling.
          files: |
            app/build/outputs/apk/core/release/*.apk
            app/build/outputs/apk/core/debug/*.apk
          draft: false
          prerelease: false
