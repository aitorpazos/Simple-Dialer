name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Smart Dialer, OU=Dev, O=Dev, L=Unknown, ST=Unknown, C=US"

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<'EOF'
          storeFile=../release.keystore
          storePassword=android
          keyAlias=release
          keyPassword=android
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' keystore.properties

      - name: Build release APK
        run: ./gradlew assembleCoreRelease

      - name: Build debug APK
        run: ./gradlew assembleCoreDebug

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Smart Dialer ${{ steps.version.outputs.tag }}
          body: |
            ## Smart Dialer ${{ steps.version.outputs.tag }}

            Fork of Simple Dialer with added features:
            - 📞 **Call Recording** — Record all calls automatically
            - 🤖 **Auto-Answer** — Automatically answer calls (all / unknown callers / disabled)
            - 📋 **Call Summary** — Get a notification summary after each call

            ### Install
            Download the **debug APK** (works on all devices without signing issues) or the **release APK** (signed, minified).
          files: |
            app/build/outputs/apk/core/release/*.apk
            app/build/outputs/apk/core/debug/*.apk
          draft: false
          prerelease: false
